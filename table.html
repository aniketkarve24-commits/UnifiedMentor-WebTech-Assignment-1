<!DOCTYPE html>
<html>
<head><title>Data Table</title></head>
<body>
    <h2>Vulnerability Assessment Report</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Vulnerability</th>
            <th>Severity</th>
        </tr>
        <tr>
            <td>1</td>
            <td>SQL Injection</td>
            <td style="color:red">Critical</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Stored XSS</td>
            <td style="color:orange">High</td>
        </tr>
    </table>
</body>
</html>
